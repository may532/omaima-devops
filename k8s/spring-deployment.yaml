apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
        - name: spring-app
          image: omaimasahli/spring-k8s-app:1.0
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config
